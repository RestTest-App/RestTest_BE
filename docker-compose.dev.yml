
services:
  mysql:
    image: mysql:8.0
    restart: always
    env_file:
      - .env.dev
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: redis-dev
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  fastapi:
    build:
      context: .
      args:
        MODE: dev
    container_name: resttest-dev
    image: resttest-server
    command: uvicorn main:app --host 0.0.0.0 --port 8080 --reload
    restart: always
    ports:
      - "8080:8080"
    env_file:
      - .env.dev
    environment:
      - MODE=dev
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./:/code
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy



volumes:
  mysql-data:
